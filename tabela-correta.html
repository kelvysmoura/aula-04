<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Tabela de Produtos</title>
    <style>
        table {
            border-spacing: 0;
            border-collapse: collapse;
        }

        td,
        th {
            /* border-width: 1px;
    border-color: #000;
    border-style: solid; */
            border: 1px solid #000;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h2>Tabela de Produtos</h2>

    <table width="50%" align="center">

        <!-- Cabeçalho -->
        <thead bgcolor="#f2f2f2">
            <tr align="center">
                <th>ID</th>
                <th>Produto</th>
                <th>Categoria</th>
                <th>Preço (R$)</th>
                <th>Estoque</th>
                <th>Status</th>
            </tr>
        </thead>

        <!-- Corpo -->
        <tbody>
            <tr align="center">
                <td>1</td>
                <td>Notebook</td>
                <td rowspan="2">Eletrônicos</td>
                <td>3500,00</td>
                <td>15</td>
                <td bgcolor="#c8e6c9">Disponível</td>
            </tr>
            <tr align="center">
                <td>2</td>
                <td>Smartphone</td>
                <td>2200,00</td>
                <td>30</td>
                <td bgcolor="#c8e6c9">Disponível</td>
            </tr>
            <tr align="center">
                <td>3</td>
                <td>Cadeira Gamer</td>
                <td>Móveis</td>
                <td>1200,00</td>
                <td>5</td>
                <td bgcolor="#fff3cd">Baixo estoque</td>
            </tr>
            <tr align="center">
                <td>4</td>
                <td>Mouse</td>
                <td>Acessórios</td>
                <td>150,00</td>
                <td>0</td>
                <td bgcolor="#f8d7da">Indisponível</td>
            </tr>
        </tbody>

        <!-- Rodapé -->
        <tfoot>
            <tr align="center">
                <td colspan="4"><strong>Total de Produtos</strong></td>
                <td colspan="2">4 itens cadastrados</td>
            </tr>
        </tfoot>

    </table>

</body>

</html>
