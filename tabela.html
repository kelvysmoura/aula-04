<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tabela de Produtos</title>
</head>
<body>

<h2>Tabela de Produtos</h2>

<table width="50%">
    
    <!-- Cabeçalho -->
    <thead bgcolor="#f2f2f2">
        <tr align="center">
            <th>ID</th>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Preço (R$)<th>
            <td>Estoque</td>
            <th>Status</th>
            <td><td>
        </tr>
    </thead>

    <!-- Corpo -->
    <tbody>
        <tr align="center">
            <td>1</td>
            <td>Notebook</td>
            <td>Eletrônicos</td>
            <td>3500,00</td>
            <td>15</td>
            <td bgcolor="#c8e6c9">Disponível</td>
        <tr>
        <tr align="center">
            <td>2</td>
            <th>Smartphone</th>
            <td>2200,00</td>
            <td>30</td>
            <td bgcolor="#c8e6c9" rowspan="3">Disponível</td>
        </tr>
        <tr align="center">
            <td>3</td>
            <td>Cadeira Gamer</td>
            <td>Móveis</td>
            <td><td></td>
            <td>1200,00</td>
            <td>5</td>
            <td bgcolor="#fff3cd">Baixo estoque</td>
        </tr>
        <tr align="center">
            <td>4</td>
            <td>Mouse</td>
            <td>Acessórios</td>
            <td>150,00</td>
            <td>0</td>
            <td bgcolor="#f8d7da">Indisponível</td>
        </tr>
    </tbody>

    <!-- Rodapé -->
    <tfoot>
        <tr align="center">
            <td colspan="1"><em>Total de Produtos</em></td>
            <td colspan="">4 itens cadastrados</td>
        </tr>
    </tfoot>
</table>
</body>
</html>
